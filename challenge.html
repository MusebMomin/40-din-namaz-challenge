<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Challenge - 40 Day Namaz Challenge</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">40 Day Namaz Challenge</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="challenge.html">Challenge</a></li>
                <li><a href="progress.html">Progress</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <h1>Join the Challenge</h1>
        
        <section class="challenge-info">
            <h2>Challenge Details</h2>
            <div class="info-grid">
                <div class="info-card">
                    <h3>Duration</h3>
                    <p>40 consecutive days</p>
                </div>
                <div class="info-card">
                    <h3>Commitment</h3>
                    <p>Pray all 5 daily prayers</p>
                </div>
                <div class="info-card">
                    <h3>Goal</h3>
                    <p>Complete all prayers on time</p>
                </div>
            </div>
        </section>

        <section class="registration-form">
            <h2>Register for the Challenge</h2>
            <form id="challengeForm">
                <div class="form-group">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="startDate">Start Date:</label>
                    <input type="date" id="startDate" name="startDate" required>
                </div>
                <button type="submit" class="btn btn-primary">Register</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 40 Day Namaz Challenge. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
